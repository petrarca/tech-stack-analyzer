  # External/Unmapped Technologies
  unmapped:
    is_component: false
    is_primary_tech: false
    description: "Technologies from external sources not in official taxonomy (naming: unmapped_<tech>)"

  # In-house/Proprietary Technologies
  proprietary:
    is_component: false
    is_primary_tech: false
    description: "In-house/internal technologies (naming: prop_<name> or prop_<org>_<name>)"
