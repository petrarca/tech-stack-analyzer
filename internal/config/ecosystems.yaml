# Technology Ecosystem Definitions
#
# Ecosystems represent high-level runtime/development platform families.
# They answer the question: "What technology stacks does product X use?"
#
# Detection priority:
#   1. component_types  -- strongest signal (package manager / build system)
#   2. techs            -- framework/runtime techs detected in components
#   3. languages        -- fallback for ecosystems without package managers
#
# A product may belong to multiple ecosystems (e.g., JVM + Node.js + .NET).
# Ecosystems are derived during aggregation from detected components,
# primary_techs, and primary_languages.
#
# This list is extensible. Add new ecosystems as needed when scanning
# codebases with unrecognized platform families.

ecosystems:
  - name: JVM
    description: Java Virtual Machine platform (Java, Kotlin, Scala, Groovy, Clojure)
    component_types:
      - maven
      - gradle
    techs:
      - spring
      - springboot
      - quarkus
      - hibernate
      - java
      - ktor
    languages:
      - Java
      - Kotlin
      - Scala
      - Groovy
      - Clojure

  - name: .NET
    description: Microsoft .NET platform (C#, VB.NET, F#) -- both Framework and modern .NET
    component_types:
      - dotnet
    techs:
      - dotnet
      - dotnetcore
      - aspnet
      - entityframework
      - wpf
      - maui
      - autofac
      - csharp
      - vbnet
    languages:
      - C#
      - "Visual Basic .NET"
      - F#

  - name: Node.js
    description: JavaScript/TypeScript server runtime and npm/pnpm/yarn ecosystem
    component_types:
      - nodejs
      - nx
    techs:
      - nodejs
      - express
      - nestjs
      - fastify
      - honojs
      - adonisjs
      - electron
    languages: []  # JS/TS alone don't confirm Node.js -- could be browser-only

  - name: Python
    description: CPython runtime and pip/poetry/uv ecosystem
    component_types:
      - python
    techs:
      - django
      - fastapi
      - flask
      - python
    languages:
      - Python

  - name: Go
    description: Go toolchain and module system
    component_types:
      - golang
    techs:
      - golang
    languages:
      - Go

  - name: Rust
    description: Rust toolchain and Cargo ecosystem
    component_types:
      - cargo
    techs: []
    languages:
      - Rust

  - name: C/C++
    description: Native C/C++ with CMake, Make, Conan, vcpkg, MSBuild build systems
    component_types:
      - cmake
      - conan
      - msbuild-cpp
    techs:
      - cplusplus
      - c
      - cmake
      - mfc
      - qt
    languages:
      - C++
      - C

  - name: Delphi
    description: Embarcadero Delphi / Object Pascal (VCL, FMX)
    component_types:
      - delphi
    techs:
      - delphi
      - vcl
    languages:
      - Pascal

  - name: PHP
    description: PHP runtime and Composer ecosystem
    component_types:
      - composer
      - php
    techs:
      - laravel
      - symfony
      - yii2
      - wordpress
      - drupal
    languages:
      - PHP

  - name: Ruby
    description: Ruby runtime and Bundler/Gems ecosystem
    component_types:
      - ruby
    techs:
      - rails
    languages:
      - Ruby

  - name: Swift
    description: Apple Swift and Objective-C (SPM, CocoaPods, Xcode)
    component_types:
      - swift
      - cocoapods
    techs: []
    languages:
      - Swift
      - Objective-C

  - name: Dart
    description: Dart runtime and Flutter / pub ecosystem
    component_types:
      - dart
      - flutter
    techs: []
    languages:
      - Dart

  - name: Elixir
    description: Elixir / Erlang BEAM VM (Mix, Hex)
    component_types:
      - mix
    techs: []
    languages:
      - Elixir
      - Erlang

  - name: VB6
    description: Visual Basic 6.0 (Classic VB, COM) -- no package manager, language-only detection
    component_types: []
    techs: []
    languages:
      - "Visual Basic 6.0"
