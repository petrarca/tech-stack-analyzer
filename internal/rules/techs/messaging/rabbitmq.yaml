tech: rabbitmq
name: RabbitMQ
dotenv:
  - RABBITMQ_
dependencies:
  - type: npm
    name: amqplib
    example: amqplib
  - type: npm
    name: "@opentelemetry/instrumentation-amqplib"
    example: "@opentelemetry/instrumentation-amqplib"
  - type: cargo
    name: rabbitmq-stream-client
    example: rabbitmq-stream-client
  - type: gem
    name: bunny
    example: bunny
  - type: composer
    name: php-amqplib/php-amqplib
    example: php-amqplib/php-amqplib
  - type: npm
    name: "@pulumi/rabbitmq"
    example: "@pulumi/rabbitmq"
  - type: pypi
    name: amqp
    example: amqp
