version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - gocyclo        # Cyclomatic complexity (like Python's C90)
    - gocognit       # Cognitive complexity
    - govet          # Go vet
    - staticcheck    # Advanced static analysis
    - ineffassign    # Ineffectual assignments
    - misspell       # Spelling mistakes
  disable:
    - errcheck       # Disabled: only affects tool code, exclude-rules don't work
  settings:
    gocyclo:
      # Maximum cyclomatic complexity.
      # TODO: ratchet down toward 15. 30 is the current codebase maximum;
      # lowering requires refactoring a backlog of complex functions
      # (tracked in a dedicated branch).
      min-complexity: 30
    gocognit:
      # Maximum cognitive complexity. See the gocyclo TODO above.
      min-complexity: 30

issues:
  max-issues-per-linter: 0
  max-same-issues: 0