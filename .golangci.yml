version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - gocyclo        # Cyclomatic complexity (like Python's C90)
    - gocognit       # Cognitive complexity
    - govet          # Go vet
    - staticcheck    # Advanced static analysis
    - ineffassign    # Ineffectual assignments
    - misspell       # Spelling mistakes
  disable:
    - errcheck       # Disabled: only affects tool code, exclude-rules don't work
  settings:
    gocyclo:
      # Maximum cyclomatic complexity.
      # Being ratcheted down toward 15, one step at a time, refactoring the
      # offenders at each step.
      min-complexity: 29
    gocognit:
      # Maximum cognitive complexity. See the gocyclo note above.
      min-complexity: 29

issues:
  max-issues-per-linter: 0
  max-same-issues: 0